worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Fallback server for bare requests
    server {
        listen 80 default_server;
        server_name _;

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /404.html;
        }

        location = /404.html {
            internal;
        }
    }

    # Dynamic subdomain server: <subdomain>.dev.<domain>
    # Named capture sets $subdomain automatically; root is per-subdomain directory.
    server {
        listen 80;
        server_name ~^(?P<subdomain>[^.]+)\.dev\..+$;

        index index.html index.htm;

        location / {
            root /usr/share/nginx/html/$subdomain;
            try_files $uri $uri/ =404;
        }

        error_page 404 /404.html;
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }

        add_header X-Subdomain $subdomain always;
    }
}
