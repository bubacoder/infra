name: Build dev & admin container

on:
  push:
    branches: ["main", "devcontainer-deploy"]
    paths: ['.github/workflows/devcontainer.yml', '.devcontainer/Dockerfile', 'ansible/**']
  pull_request:
    paths: ['.github/workflows/devcontainer.yml', '.devcontainer/Dockerfile', 'ansible/**']
  workflow_dispatch:

concurrency:
  group: "devcontainer"
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distribution:
          - tag: debian
            base_image: debian:bookworm-slim
          - tag: ubuntu
            base_image: ubuntu:24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ansible
          file: .devcontainer/Dockerfile
          push: false # Set to true if you want to push directly after build
          tags: infra-devcontainer:${{ matrix.distribution.tag }}
          build-args: |
            BASE_IMAGE=${{ matrix.distribution.base_image }}

  push-to-hgcr:
    needs: build-test
    runs-on: ubuntu-latest
    if: success() # && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      matrix:
        distribution:
          - tag: debian
          - tag: ubuntu
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: ansible
          file: ../.devcontainer/Dockerfile
          push: true # This will push the image to the registry after building
          tags: hgcr.io/bubacoder/infra-devcontainer:${{ matrix.distribution.tag }}-latest
