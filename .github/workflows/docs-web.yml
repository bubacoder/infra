name: Documentation site

# To enable Pages, set "Source" to "GitHub Actions" on "Settings" -> "Code and automation" -> "Pages"

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Runs on pull requests
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "docs-web"
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build with Hugo
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: docs/web/Dockerfile
          tags: docs:latest
          build-args: HUGO_BASEURL=${{ steps.pages.outputs.base_url }}/
          cache-from: type=gha,scope=hugo-docs
          cache-to: type=gha,mode=max,scope=hugo-docs
          outputs: type=docker,dest=/tmp/hugo-site.tar

      - name: Extract site files
        run: |
          mkdir -p public
          docker load --input /tmp/hugo-site.tar
          docker run --user "$(id -u):$(id -g)" --rm -v "$(pwd)/public:/public" docs:latest cp -r /site /public

      - name: Validate site build
        run: |
          SITE_INDEX="./public/site/index.html"
          if [ ! -f "$SITE_INDEX" ]; then
            echo "Error: $SITE_INDEX not found"
            exit 1
          fi
          echo "Validation passed: $SITE_INDEX exists"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./public/site

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: success() && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
